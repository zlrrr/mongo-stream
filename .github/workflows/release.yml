name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          GONOSUMDB: '*'
          GOFLAGS: '-mod=mod'
        run: |
          BINARY=mongo-stream${{ matrix.ext }}
          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.tag.outputs.name }}" \
            -o "$BINARY" \
            .

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          TAG=${{ steps.tag.outputs.name }}
          ARTIFACT="mongo-stream_${TAG}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -czf "$ARTIFACT" mongo-stream README.md README_zh.md LICENSE
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          TAG=${{ steps.tag.outputs.name }}
          ARTIFACT="mongo-stream_${TAG}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          zip "$ARTIFACT" mongo-stream.exe README.md README_zh.md LICENSE
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mongo-stream_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.tag.outputs.name }}
          PRERELEASE=""
          if echo "$TAG" | grep -q '-'; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE \
            dist/*.tar.gz dist/*.zip dist/checksums.txt
